<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Romans Quiz</title>

<style>
body { font-family: Arial; padding:20px; max-width:800px; margin:auto; }

.question { margin-bottom:20px; padding:10px; border-radius:8px; }

.question p {
  font-weight: bold;
  font-size: 16px;
}

.correct { background:#d4edda; }
.incorrect { background:#f8d7da; }

.correct-answer { font-size:14px; margin-top:8px; }

.verse {
  font-size:13px;
  margin-top:5px;
  font-style:italic;
  color:#333;
}

.center { text-align:center; margin-top:20px; }

button { padding:10px 15px; font-size:16px; }

#result {
  font-size:20px;
  font-weight:bold;
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h1>📖 Romans Quiz</h1>
<p><em>Please select the right option for each question.</em></p>

<form id="quizForm"></form>

<div class="center">
<button onclick="submitQuiz()">Submit</button>
</div>

<div id="result"></div>
<div class="center" id="retakeContainer"></div>

<script>

const questions = [
{q:"What does Paul say the gospel reveals about God?",options:["God’s anger","God’s righteousness","Human weakness","Law and judgment"],answer:1,ref:"Romans 1:17",verse:"The righteousness of God is revealed from faith to faith."},
{q:"How is God’s invisible nature clearly seen by humanity?",options:["Through prophets","Through Scripture alone","Through creation","Through angels"],answer:2,ref:"Romans 1:20",verse:"His invisible attributes are clearly seen, being understood by the things that are made."},
{q:"What does Paul say leads people to repentance?",options:["Fear","God’s kindness","Law","Punishment"],answer:1,ref:"Romans 2:4",verse:"The goodness of God leads you to repentance."},
{q:"Who is a true Jew?",options:["Outward","Born","Inward by Spirit","Tradition"],answer:2,ref:"Romans 2:29",verse:"He is a Jew who is one inwardly."},
{q:"How many are righteous?",options:["Many","Few","None","Jews"],answer:2,ref:"Romans 3:10",verse:"There is none righteous, no, not one."},
{q:"Justification comes through?",options:["Works","Faith","Sacrifice","Obedience"],answer:1,ref:"Romans 3:22",verse:"Through faith in Jesus Christ."},
{q:"Abraham was justified by?",options:["Works","Circumcision","Faith","Law"],answer:2,ref:"Romans 4:3",verse:"Abraham believed God."},
{q:"Righteousness credited before?",options:["Obedience","Circumcision","Belief","Land"],answer:1,ref:"Romans 4:10",verse:"Not while circumcised, but uncircumcised."},
{q:"Sin entered through?",options:["Moses","Abraham","Adam","David"],answer:2,ref:"Romans 5:12",verse:"Through one man sin entered."},
{q:"Suffering produces?",options:["Fear","Weakness","Perseverance","Confusion"],answer:2,ref:"Romans 5:3",verse:"Tribulation produces perseverance."},
{q:"Believers are dead to?",options:["Law","Sin","World","Judgment"],answer:1,ref:"Romans 6:2",verse:"We who died to sin."},
{q:"Wages of sin?",options:["Punishment","Death","Separation","Judgment"],answer:1,ref:"Romans 6:23",verse:"The wages of sin is death."},
{q:"Law compared to?",options:["Friendship","Marriage","Servanthood","Brotherhood"],answer:1,ref:"Romans 7:2",verse:"Bound by law to husband."},
{q:"Paul’s struggle?",options:["Doing what he wants","Not knowing law","Doing what he hates","Ignoring"],answer:2,ref:"Romans 7:15",verse:"What I hate, that I do."},
{q:"No condemnation for?",options:["All","Righteous","In Christ","Obedient"],answer:2,ref:"Romans 8:1",verse:"No condemnation in Christ."},
{q:"Helps in weakness?",options:["Law","Angels","Spirit","Faith"],answer:2,ref:"Romans 8:26",verse:"The Spirit helps our weaknesses."},
{q:"Separate from love?",options:["Sin","Death","Nothing","Trials"],answer:2,ref:"Romans 8:39",verse:"Nothing shall separate us."},
{q:"Rebekah prophecy?",options:["Younger serves older","Older serves younger","Equal","None"],answer:1,ref:"Romans 9:12",verse:"The older shall serve the younger."},
{q:"God shows mercy to?",options:["Deserving","Obedient","Whom He wills","Israel"],answer:2,ref:"Romans 9:15",verse:"I will have mercy on whom I will."},
{q:"Faith comes by?",options:["Reading","Hearing","Prayer","Obedience"],answer:1,ref:"Romans 10:17",verse:"Faith comes by hearing."},
{q:"Who will be saved?",options:["Righteous","Confess & believe","Jews","Obedient"],answer:1,ref:"Romans 10:9",verse:"Confess and believe."},
{q:"Israel is what tree?",options:["Fig","Olive","Vine","Cedar"],answer:1,ref:"Romans 11:17",verse:"Olive tree."},
{q:"Gentiles are?",options:["Natural","Broken","Wild grafted","Root"],answer:2,ref:"Romans 11:17",verse:"Wild branches grafted."},
{q:"Type of sacrifice?",options:["Burnt","Living","Sin","Grain"],answer:1,ref:"Romans 12:1",verse:"Living sacrifice."},
{q:"Transformation by?",options:["Effort","Discipline","Renewing mind","Prayer"],answer:2,ref:"Romans 12:2",verse:"Renewing your mind."},
{q:"Authority from?",options:["Govt","People","God","Leaders"],answer:2,ref:"Romans 13:1",verse:"Authorities are appointed by God."},
{q:"Love fulfills?",options:["Faith","Law","Grace","Justice"],answer:1,ref:"Romans 13:10",verse:"Love fulfills the law."},
{q:"Do not judge in?",options:["Sin","Faith","Disputable matters","Truth"],answer:2,ref:"Romans 14:1",verse:"Disputable matters."},
{q:"Kingdom is?",options:["Food","Rules","Righteousness peace joy","Sacrifice"],answer:2,ref:"Romans 14:17",verse:"Righteousness, peace, joy."},
{q:"Christ servant to?",options:["Gentiles","Jews","Poor","All"],answer:1,ref:"Romans 15:8",verse:"Servant to circumcision."},
{q:"God fills with?",options:["Strength","Knowledge","Joy & peace","Faith"],answer:2,ref:"Romans 15:13",verse:"Joy and peace."},
{q:"Church servant?",options:["Priscilla","Phoebe","Mary","Junia"],answer:1,ref:"Romans 16:1",verse:"Phoebe."},
{q:"Watch out for?",options:["False teachers","Govt","Persecution","Poverty"],answer:0,ref:"Romans 16:17",verse:"Avoid those causing division."},
{q:"Power of God?",options:["Law","Gospel","Faith","Grace"],answer:1,ref:"Romans 1:16",verse:"Gospel is power."},
{q:"Law purpose?",options:["Save","Justify","Reveal sin","Bless"],answer:2,ref:"Romans 3:20",verse:"Knowledge of sin."},
{q:"Gives life to dead?",options:["Angels","God","Faith","Spirit"],answer:1,ref:"Romans 4:17",verse:"God gives life."},
{q:"Reigns through righteousness?",options:["Law","Grace","Faith","Spirit"],answer:1,ref:"Romans 5:21",verse:"Grace reigns."},
{q:"Led by Spirit are?",options:["Servants","Believers","Sons of God","Apostles"],answer:2,ref:"Romans 8:14",verse:"Sons of God."},
{q:"Israel failed to attain?",options:["Faith","Grace","Righteousness","Salvation"],answer:2,ref:"Romans 9:31",verse:"Did not attain righteousness."},
{q:"Root supports?",options:["Faith","Law","Patriarchs/promises","Covenant"],answer:2,ref:"Romans 11:18",verse:"Root supports you."}
];

const form = document.getElementById("quizForm");

questions.forEach((item,index)=>{
const div=document.createElement("div");
div.classList.add("question");
div.id=`qbox${index}`;

let html=`<p>${index+1}. ${item.q}</p>`;
item.options.forEach((opt,i)=>{
html+=`<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`;
});

div.innerHTML=html;
form.appendChild(div);
});

function submitQuiz(){

let score=0;
let total=questions.length;

questions.forEach((q,i)=>{
const selected=document.querySelector(`input[name=q${i}]:checked`);
const box=document.getElementById(`qbox${i}`);

if(!selected) return;

const val=parseInt(selected.value);

if(val===q.answer){
score++;
box.classList.add("correct");
}else{
box.classList.add("incorrect");

const info=document.createElement("div");
info.className="correct-answer";

info.innerHTML=`
<b>Correct Answer:</b> ${q.options[q.answer]}<br>
<span class="verse">${q.ref} – ${q.verse}</span>
`;

box.appendChild(info);
}

document.querySelectorAll(`input[name=q${i}]`).forEach(inp=>inp.disabled=true);
});

let message=`Your Score: ${score} / ${total}\n\n`;

if(score >= 30){
message += "Excellent! You've mastered Romans 🎉";
}
else if(score >= 20){
message += "Good job! Strong understanding 👍";
}
else if(score >= 10){
message += "Keep growing — you're getting there 📖";
}
else{
message += "Review Romans again and try once more 💪";
}

document.getElementById("result").innerText=message;

document.getElementById("retakeContainer").innerHTML=
`<br><button onclick="location.reload()">Retake Quiz</button>`;
}

</script>

</body>
</html>
